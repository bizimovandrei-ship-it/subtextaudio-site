name = "subtext-audio-website"
compatibility_date = "2024-06-01"
pages_build_output_dir = "."

[vars]
CONTACT_TO = "subtextaudio@gmail.com"
CONTACT_FROM = "Subtext Audio <contact@subtextaudio.com>"
RATE_LIMIT_MAX = "5"
RATE_LIMIT_WINDOW = "600"

# KV binding (RATE_LIMIT) must be configured in the Cloudflare Pages dashboard.
# Do not add placeholder IDs here — invalid kv_namespaces entries break deployment.

# Set secrets via CLI or Dashboard (never commit them):
#   wrangler secret put TURNSTILE_SECRET_KEY
#   wrangler secret put RESEND_API_KEY
